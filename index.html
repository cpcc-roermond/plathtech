          "@type": "Question",

            "@type": "Answer",

        },

          }

          "@type": "Question",
          "name": "Was ist die KI-Starthilfe von CPCC?",
          "acceptedAnswer": {
            "@type": "Answer",

          }
        },

          "acceptedAnswer": {
